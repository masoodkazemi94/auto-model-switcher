name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: ./tests/verify.sh
      - run: npm install --ignore-scripts
        working-directory: vscode-extension
      - run: npm test
        working-directory: vscode-extension
      - run: npm run package
        working-directory: vscode-extension
